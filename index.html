<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rabbit Escape</title>
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <main class="menu">
    <section class="menu-panel">
      <button id="playBtn" class="menu-btn play">Play Game</button>
      <button id="readBtn" class="menu-btn read">Read Me</button>
    </section>

    <section id="readPanel" class="read-panel" aria-hidden="true">
      <div class="warning-note">
        <button id="closeReadBtn" class="x-btn" aria-label="Close Read Me">×</button>
        <h2>Warning</h2>
        <p>The rabbit is loose.</p>
        <p>Find the keys. Move between rooms. Do not let the danger bar fill.</p>
        <p class="red-text">If you hear it getting closer, run.</p>
      </div>
    </section>

    <section id="loading" class="loading" aria-hidden="true">
      <div class="loader"></div>
      <p>Entering the school...</p>
    </section>
  </main>

  <script src="./script.js"></script>
</body>
</html>
