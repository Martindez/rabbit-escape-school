<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rabbit Escape</title>
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <div class="dark-overlay"></div>
  <div class="soft-vignette"></div>

  <main class="menu">
    <section class="title-area">
      <p class="small-title">Rabbit Escape</p>
      <h1>Rabbit<br />Escape</h1>
      <p class="subtitle">Choose your escape</p>
    </section>

    <section class="level-menu">
      <a class="level-card school" href="./school/">
        <span class="level-number">Level 1</span>
        <span class="level-name">School Escape</span>
      </a>

      <a class="level-card pizzaria" href="./pizzaria/">
        <span class="level-number">Level 2</span>
        <span class="level-name">Venezia Pizzaria</span>
      </a>

      <div class="level-card locked">
        <span class="level-number">Level 3</span>
        <span class="level-name">Coming Soon</span>
      </div>
    </section>

    <button id="ambientToggle" class="ambient-toggle" type="button">
      Ambient: ON
    </button>
  </main>

  <footer class="footer">
    Rabbit Escape
  </footer>

  <script src="./script.js"></script>
</body>
</html>
