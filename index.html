<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rabbit Escape</title>
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <audio id="menuMusic" src="./assets/menu-theme.mp3" loop preload="auto"></audio>

  <main class="menu">
    <div class="top-controls">
      <button id="muteBtn" class="icon-btn" type="button">Music: ON</button>
    </div>

    <section class="menu-panel">
      <button id="playBtn" class="menu-btn play" type="button">Play Game</button>
      <button id="readBtn" class="menu-btn read" type="button">Read Me</button>
    </section>

    <section id="readPanel" class="read-panel" aria-hidden="true">
      <div class="read-card">
        <button id="closeReadBtn" class="close-btn" type="button">×</button>
        <h2>Warning</h2>
        <p>The rabbit is hunting you.</p>
        <p>Find every key, move between rooms, and escape before it catches you.</p>
        <p class="danger-text">Do not wait too long.</p>
      </div>
    </section>

    <section id="loading" class="loading" aria-hidden="true">
      <div class="loader"></div>
      <p>Entering the school...</p>
    </section>
  </main>

  <script src="./script.js"></script>
</body>
</html>
