<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

  <title>Still Insane</title>

  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Still Insane" />

  <link rel="apple-touch-icon" href="assets/Icon.png" />
  <link rel="icon" href="assets/Icon.png" />
  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <audio id="menuMusic" src="assets/game-ambient.mp3" loop preload="auto"></audio>

  <main class="menu-screen">
    <img class="moving-bg" src="assets/menu-bg-clean.jpg" alt="Still Insane Menu Background" />

    <div class="rain"></div>
    <div class="fog"></div>
    <div class="dark-vignette"></div>

    <section class="menu-content">
      <div class="menu-buttons">
        <button class="menu-btn play-btn" type="button" onclick="playGame()">PLAY</button>
        <button class="menu-btn" id="muteBtn" type="button" onclick="toggleMute()">MUTE</button>
        <button class="menu-btn" type="button" onclick="openReadMe()">READ ME</button>
      </div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
